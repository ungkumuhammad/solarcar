name: Deploy dashboard to GitHub Pages

# Publishes index.html (the interactive simulator dashboard) to GitHub Pages.
# The configure-pages step uses enablement:true so the workflow turns Pages on
# itself (build_type=workflow) on the first run — no manual Settings step needed.

on:
  push:
    branches: ["main"]
    paths: ["index.html", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
